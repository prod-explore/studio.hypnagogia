version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: studio.hypnagogia-nginx
    volumes:
      - ./frontend/html:/usr/share/nginx/html:ro
      - ./frontend/nginx/hypnagogia.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - hypnagogia
  backend:
    build: ./backend
    container_name: hypnagogia-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    networks:
      - hypnagogia


networks:
  hypnagogia:
    external: true
