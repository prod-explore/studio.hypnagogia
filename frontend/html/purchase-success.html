<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Zakup udany! - Studio Hypnagogia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            /* Fallback */
            text-align: center;
            padding: 20px;
        }

        .success-card {
            background: rgba(22, 22, 22, 0.9);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .contact-block {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-size: 0.9em;
            color: #888;
        }

        .contact-email {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .contact-email:hover {
            color: #fff;
            text-decoration: underline;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Particles background fix */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>

<body>

    <div id="particles-js"></div>

    <div class="success-card">
        <div class="success-icon">🎉</div>
        <h1>Dziękujemy za zakup!</h1>
        <p>Twoja płatność została przyjęta.</p>
        <p>Licencja została wysłana na Twój adres email.</p>
        <p style="font-size: 0.9em; color: #888; margin-top: 20px;">Sprawdź folder SPAM, jeśli nie widzisz wiadomości.
        </p>

        <div class="contact-block">
            <p style="margin-bottom: 5px;">Masz problem z zakupem?</p>
            <a href="mailto:hello@kontakt.studio.hypnagogia.pl"
                class="contact-email">hello@kontakt.studio.hypnagogia.pl</a>
        </div>

        <a href="/" class="btn">Wróć do strony głównej</a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" } }
            }
        });
    </script>
</body>

</html>
