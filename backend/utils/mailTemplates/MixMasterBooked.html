<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Nowe zgłoszenie – Mix/Master</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #fafafa; padding: 20px; }
    .container { background: #ffffff; padding: 30px; max-width: 600px; margin: auto; border-radius: 8px; }
    h1 { color: #111; font-size: 22px; margin-bottom: 10px; }
    p { font-size: 15px; line-height: 1.6; }
    .label { font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nowe zgłoszenie Mix/Master</h1>

    <p><span class="label">Imię:</span> {{name}}</p>
    <p><span class="label">Email:</span> {{email}}</p>

    <p>
      <span class="label">Link do plików:</span><br>
      <a href="{{link}}" target="_blank">{{link}}</a>
    </p>

    {{#comment}}
    <p>
      <span class="label">Komentarz:</span><br>
      {{comment}}
    </p>
    {{/comment}}
  </div>
</body>
</html>
